<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canyon Raider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script src="https://not-fl3.github.io/miniquad_wasm/gl.js"></script>
    <script>
        load("canyon_raider.wasm").catch(err => {
            console.error("Failed to load game:", err);
            document.body.innerHTML = `
                <div style="color: #fff; text-align: center; padding: 20px; width: 100vw; height: 100vh;">
                    <h1>Failed to load Canyon Raider</h1>
                    <p>${err.message}</p>
                    <p style="margin-top: 20px; font-size: 12px;">Check console (F12) for details</p>
                </div>
            `;
        });
    </script>
</body>
</html>
